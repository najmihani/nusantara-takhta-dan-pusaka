<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUSANTARA: Takhta & Pusaka - Prototaip</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { margin-bottom: 10px; color: #f5c842; text-shadow: 2px 2px 4px #000; }
        #container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        #mapCanvas { border: 2px solid #6a4e2e; border-radius: 12px; background: #2d4a3b; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.7); }
        #sidebar { background: #16213e; padding: 20px; border-radius: 12px; width: 260px; border: 1px solid #3a5a7a; }
        #sidebar h3 { border-bottom: 1px solid #3a5a7a; padding-bottom: 8px; margin-bottom: 12px; }
        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 14px; color: #b0c4de; }
        #yearSlider { width: 100%; accent-color: #f5c842; }
        #yearDisplay { font-size: 24px; font-weight: bold; color: #f5c842; text-align: center; }
        #infoBox { background: #0f3460; padding: 12px; border-radius: 8px; min-height: 80px; font-size: 14px; line-height: 1.6; }
        .btn { background: #f5c842; color: #1a1a2e; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-right: 8px; transition: 0.2s; }
        .btn:hover { background: #e0b030; transform: scale(1.02); }
        .btn.secondary { background: #3a5a7a; color: white; }
        .btn.secondary:hover { background: #4a6a8a; }
        #modeIndicator { background: #2a2a4a; padding: 6px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 8px; }
        #provinceList { max-height: 150px; overflow-y: auto; font-size: 13px; margin-top: 8px; background: #0a0a1a; padding: 8px; border-radius: 6px; }
        #provinceList span { display: inline-block; background: #2a3a5a; padding: 2px 10px; border-radius: 12px; margin: 3px; }
        .highlight { border: 2px solid #f5c842; }
    </style>
</head>
<body>

<h1>🌏 NUSANTARA: Takhta & Pusaka</h1>
<p style="margin-bottom:14px; font-style:italic; color:#aaa;">Prototaip — Pilih tahun & wilayah (1211–1300)</p>

<div id="container">
    <!-- Peta -->
    <canvas id="mapCanvas" width="700" height="550"></canvas>

    <!-- Panel Kawalan -->
    <div id="sidebar">
        <h3>⚙️ Kawalan</h3>
        <div class="control-group">
            <label for="yearSlider">📅 Tahun: <span id="yearDisplay">1211</span></label>
            <input type="range" id="yearSlider" min="1211" max="1300" value="1211" step="1">
        </div>

        <div class="control-group">
            <label>🎮 Mod</label>
            <button id="btnView" class="btn secondary">Lihat Peta</button>
            <button id="btnCreate" class="btn">Cipta Kerajaan</button>
            <span id="modeIndicator">Mod: Lihat</span>
        </div>

        <div class="control-group">
            <label>📋 Maklumat</label>
            <div id="infoBox">
                <p><strong>Wilayah:</strong> <span id="provName">-</span></p>
                <p><strong>Pemilik:</strong> <span id="ownerName">-</span></p>
                <p><strong>Budaya:</strong> <span id="cultureName">-</span></p>
            </div>
        </div>

        <div class="control-group">
            <label>🗺️ Wilayah Dipilih (ciptaan)</label>
            <div id="provinceList">Tiada</div>
            <button id="btnClearSelection" class="btn secondary" style="margin-top:6px;">Kosongkan</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// 1. DATA PROVINSI & KERAJAAN (versi ringkas untuk prototaip)
// ============================================================
const PROVINCE_DATA = [
    { id: 'melaka', name: 'Melaka', x: 420, y: 320, culture: 'Melayu' },
    { id: 'negeri_sembilan', name: 'Negeri Sembilan', x: 470, y: 340, culture: 'Melayu' },
    { id: 'johor', name: 'Johor', x: 540, y: 370, culture: 'Melayu' },
    { id: 'pahang', name: 'Pahang', x: 550, y: 290, culture: 'Melayu' },
    { id: 'perak', name: 'Perak', x: 400, y: 260, culture: 'Melayu' },
    { id: 'kedah', name: 'Kedah', x: 350, y: 200, culture: 'Melayu' },
    { id: 'patani', name: 'Patani', x: 500, y: 200, culture: 'Melayu' },
    { id: 'aceh', name: 'Aceh', x: 150, y: 130, culture: 'Melayu' },
    { id: 'sumatera_utara', name: 'Sumatera Utara', x: 200, y: 250, culture: 'Batak' },
    { id: 'jambi', name: 'Jambi', x: 250, y: 340, culture: 'Melayu' },
    { id: 'palembang', name: 'Palembang', x: 300, y: 400, culture: 'Melayu' },
    { id: 'singapura', name: 'Singapura', x: 580, y: 400, culture: 'Melayu' }
];

// Data kerajaan: tahun muncul & luput (untuk 1211-1300)
const KINGDOM_DATA = [
    { id: 'sriwijaya', name: 'Sriwijaya', color: '#8B4513', appear: 600, disappear: 1400, provinces: ['palembang', 'jambi'] },
    { id: 'melayu_jambi', name: 'Melayu Jambi', color: '#DAA520', appear: 1100, disappear: 1400, provinces: ['jambi'] },
    { id: 'kedah_tua', name: 'Kedah Tua', color: '#2E8B57', appear: 800, disappear: 1400, provinces: ['kedah'] },
    { id: 'pagan', name: 'Pagan (Bagan)', color: '#B22222', appear: 1044, disappear: 1287, provinces: [] }, // luar skop
    { id: 'khmer', name: 'Kerajaan Khmer', color: '#FF8C00', appear: 802, disappear: 1431, provinces: [] }
];

// Status pemilikan mengikut tahun (fungsi ringkas)
function getOwnerForYear(provinceId, year) {
    // Prototaip: hanya beberapa peraturan mudah
    if (provinceId === 'palembang' || provinceId === 'jambi') {
        if (year < 1400) return 'sriwijaya';
        return 'bebas';
    }
    if (provinceId === 'kedah') {
        if (year < 1400) return 'kedah_tua';
        return 'bebas';
    }
    if (provinceId === 'melaka') {
        if (year >= 1402) return 'melaka_sultanate'; // belum wujud dalam julat ini
        return 'bebas';
    }
    // Lain-lain dianggap bebas
    return 'bebas';
}

// ============================================================
// 2. ENJIN PETA (Map Engine)
// ============================================================
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

// Koordinat wilayah (poligon ringkas - bulatan untuk prototaip)
function drawProvinces(year, selectedIds = []) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Lukis latar belakang (laut)
    ctx.fillStyle = '#1a5276';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Lukis daratan (elips ringkas)
    ctx.fillStyle = '#2d6a4f';
    ctx.beginPath();
    ctx.ellipse(360, 300, 280, 200, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#40916c';
    ctx.beginPath();
    ctx.ellipse(380, 280, 220, 160, 0, 0, Math.PI*2);
    ctx.fill();

    // Lukis setiap wilayah sebagai bulatan
    PROVINCE_DATA.forEach(p => {
        const ownerId = getOwnerForYear(p.id, year);
        const kingdom = KINGDOM_DATA.find(k => k.id === ownerId);
        const isSelected = selectedIds.includes(p.id);
        
        // Warna berdasarkan pemilik
        let color = '#8a9ba8'; // bebas
        if (kingdom) color = kingdom.color;
        else if (ownerId === 'bebas') color = '#8a9ba8';
        else color = '#555555';
        
        // Jika terseleksi
        if (isSelected) {
            ctx.shadowColor = '#f5c842';
            ctx.shadowBlur = 20;
        } else {
            ctx.shadowBlur = 0;
        }

        // Bulatan
        ctx.beginPath();
        ctx.arc(p.x, p.y, 32, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = isSelected ? '#f5c842' : '#1a1a2e';
        ctx.lineWidth = isSelected ? 4 : 1.5;
        ctx.stroke();
        
        // Label
        ctx.shadowBlur = 0;
        ctx.font = 'bold 11px "Segoe UI"';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.name, p.x, p.y - 4);
        
        // Ikon kecil
        ctx.font = '10px sans-serif';
        ctx.fillStyle = '#ddd';
        ctx.fillText('🏰', p.x + 30, p.y - 12);
    });
    
    // Kembalikan shadow
    ctx.shadowBlur = 0;
}

// ============================================================
// 3. PENGURUSAN MASA & INTERAKSI
// ============================================================
let currentYear = 1211;
let selectedProvinces = [];
let currentMode = 'view'; // 'view' atau 'create'

const yearSlider = document.getElementById('yearSlider');
const yearDisplay = document.getElementById('yearDisplay');
const infoBox = document.getElementById('infoBox');
const provName = document.getElementById('provName');
const ownerName = document.getElementById('ownerName');
const cultureName = document.getElementById('cultureName');
const provinceList = document.getElementById('provinceList');
const modeIndicator = document.getElementById('modeIndicator');

// Kemaskini peta
function updateMap() {
    drawProvinces(currentYear, selectedProvinces);
    yearDisplay.textContent = currentYear;
    updateInfoPanel(null);
    updateProvinceList();
}

// Kemaskini panel maklumat
function updateInfoPanel(provinceId) {
    if (!provinceId) {
        provName.textContent = 'Klik wilayah untuk lihat';
        ownerName.textContent = '-';
        cultureName.textContent = '-';
        return;
    }
    const prov = PROVINCE_DATA.find(p => p.id === provinceId);
    if (!prov) return;
    const ownerId = getOwnerForYear(prov.id, currentYear);
    const kingdom = KINGDOM_DATA.find(k => k.id === ownerId);
    provName.textContent = prov.name;
    ownerName.textContent = kingdom ? kingdom.name : 'Bebas';
    cultureName.textContent = prov.culture || 'Tidak diketahui';
}

// Kemaskini senarai wilayah dipilih
function updateProvinceList() {
    if (selectedProvinces.length === 0) {
        provinceList.innerHTML = '<span style="color:#888;">Tiada wilayah dipilih</span>';
        return;
    }
    const names = selectedProvinces.map(id => {
        const p = PROVINCE_DATA.find(d => d.id === id);
        return p ? p.name : id;
    });
    provinceList.innerHTML = names.map(n => `<span>${n}</span>`).join('');
}

// Interaksi klik pada canvas
canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    
    // Cari wilayah terdekat (jarak < 40px)
    let found = null;
    for (const p of PROVINCE_DATA) {
        const dx = mouseX - p.x;
        const dy = mouseY - p.y;
        if (Math.sqrt(dx*dx + dy*dy) < 40) {
            found = p;
            break;
        }
    }
    
    if (!found) {
        updateInfoPanel(null);
        return;
    }
    
    if (currentMode === 'view') {
        // Mod lihat: tunjuk maklumat
        updateInfoPanel(found.id);
    } else if (currentMode === 'create') {
        // Mod cipta: toggle pemilihan
        const idx = selectedProvinces.indexOf(found.id);
        if (idx > -1) {
            selectedProvinces.splice(idx, 1);
        } else {
            if (selectedProvinces.length < 8) { // had 8 wilayah
                selectedProvinces.push(found.id);
            } else {
                alert('Had maksimum 8 wilayah untuk kerajaan baru (era awal).');
            }
        }
        updateMap();
        updateProvinceList();
        updateInfoPanel(found.id);
    }
});

// ============================================================
// 4. KAWALAN UI
// ============================================================
yearSlider.addEventListener('input', (e) => {
    currentYear = parseInt(e.target.value);
    updateMap();
});

document.getElementById('btnView').addEventListener('click', () => {
    currentMode = 'view';
    selectedProvinces = [];
    modeIndicator.textContent = 'Mod: Lihat Peta';
    document.getElementById('btnView').classList.add('btn');
    document.getElementById('btnView').classList.remove('secondary');
    document.getElementById('btnCreate').classList.add('secondary');
    document.getElementById('btnCreate').classList.remove('btn');
    updateMap();
    updateProvinceList();
});

document.getElementById('btnCreate').addEventListener('click', () => {
    currentMode = 'create';
    selectedProvinces = [];
    modeIndicator.textContent = 'Mod: Cipta Kerajaan (klik wilayah)';
    document.getElementById('btnCreate').classList.add('btn');
    document.getElementById('btnCreate').classList.remove('secondary');
    document.getElementById('btnView').classList.add('secondary');
    document.getElementById('btnView').classList.remove('btn');
    updateMap();
    updateProvinceList();
    alert('Klik pada wilayah untuk tambah ke kerajaan baru. Had 8 wilayah.');
});

document.getElementById('btnClearSelection').addEventListener('click', () => {
    selectedProvinces = [];
    updateMap();
    updateProvinceList();
});

// ============================================================
// 5. INISIALISASI
// ============================================================
updateMap();
updateProvinceList();
console.log('🌏 NUSANTARA: Prototaip berjaya dimuat!');
console.log('📅 Tahun semasa:', currentYear);
console.log('🎮 Mod:', currentMode);
</script>

</body>
</html>
